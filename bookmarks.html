<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Закладки — Night Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
</head>
<body data-page="bookmarks">
  <div class="app-shell">
    <header class="site-header">
      <div class="header-inner">
        <a class="btn-back" href="index.html" style="flex-shrink:0">← На форум</a>
        <a class="brand" href="market.html">
          <img src="assets/logo.svg" width="36" height="36" alt="" />
          <span>Night <strong>Store</strong></span>
        </a>
        <div class="header-search" style="max-width:400px">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="search" placeholder="Поиск…" />
        </div>
        <div class="header-actions">
          <button type="button" class="icon-btn icon-btn--cart icon-btn--cart-ns" aria-label="Корзина" aria-expanded="false" data-market-cart-toggle><span class="cart-ns-glyph" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12L6 6z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg></span></button>
          <button type="button" class="icon-btn" aria-label="Сообщения" aria-expanded="false" data-msgs-toggle><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
          <button type="button" class="icon-btn icon-btn--notify" aria-label="Уведомления" aria-expanded="false" data-notify-toggle><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 106 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></button>
          <div class="dropdown-wrap" data-dropdown>
            <button type="button" class="user-pill" data-dropdown-toggle aria-expanded="false">
              <img class="avatar avatar-img js-user-avatar" src="" alt="" width="30" height="30" loading="lazy" />
              <span class="hide-mobile js-user-name">…</span>
            </button>
            <div class="dropdown-panel">
              <a href="profile.html">Профиль</a>
              <a href="moderation.html" class="js-header-mod-link" hidden>Модерация</a>
              <a href="help.html">Поддержка 24/7</a>
            </div>
          </div>
        </div>
      </div>
    </header>
    <nav class="breadcrumbs"><a href="index.html">Форум</a> / <span>Закладки</span></nav>
    <main class="mod-page" style="padding:16px 18px 40px">
      <div class="market-header-bar" style="max-width:900px;margin:0 auto 16px">
        <span class="market-lang-strip js-market-lang-strip" aria-live="polite">₽ RUB · Русский</span>
      </div>
      <div id="bookmarksPageRoot" style="max-width:900px;margin:0 auto"></div>
    </main>
    <footer class="site-footer">Night Store · закладки</footer>
  </div>
  <script src="js/main.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
